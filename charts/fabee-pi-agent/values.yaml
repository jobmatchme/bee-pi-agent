agent:
  name: bee-pi-agent
  labels: {}

image:
  repository: ghcr.io/jobmatchme/bee-pi-agent
  tag: "0.1.0"
  pullPolicy: IfNotPresent
  pullSecretName: ""

sidecar:
  image:
    repository: ghcr.io/jobmatchme/bee-worker-sidecar
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  container:
    name: bee-worker-sidecar
    runAsUser: 10001
    runAsGroup: 10001
    runAsNonRoot: true
    readOnlyRootFilesystem: false
  nats:
    servers:
      - nats://nats.nats.svc.cluster.local:4222
    name: ""
  workerSubject: ""
  worker:
    requestTimeoutMs: 10000
    connectRetryMs: 250
    maxConnectRetryMs: 5000
  configMountPath: /config
  configFileName: config.json

transport:
  socketPath: /var/run/bee/worker.sock
  socketDir: /var/run/bee

runtime:
  workspaceRoot: /workspace
  workspaceCwd: ""
  stateDir: .bee-pi-agent
  blobStoreRoot: /workspace/.bee-blob-store

secretName: ""
secretOptional: true

serviceAccount:
  create: true
  name: ""

workspace:
  enabled: true
  type: emptyDir
  claimName: ""
  size: 20Gi
  storageClassName: hcloud-volumes
  mountPath: /workspace
  emptyDir: {}

runtimeHome:
  enabled: false
  mountPath: /home/app
  emptyDir: {}

config:
  name: ""
  env: {}

dbtProfiles:
  enabled: false
  secretName: ""
  secretKey: profiles.yml
  mountPath: /workspace/dbt-profiles

auth:
  secretName: ""
  secretKey: auth.json
  mountPath: /workspace/.pi/agent/auth.json
  envName: BEE_PI_AGENT_AUTH_FILE

git:
  repoUrl: ""
  branch: main
  targetDir: repo
  cloneDepth: 1
  image: alpine/git:2.47.2
  sshSecretName: ""
  configSecretName: ""
  configSecretKey: gitconfig
  runtimeSshDir: /workspace/.ssh
  runtimeConfigPath: /workspace/.gitconfig
  runtimeKeyFile: id_ed25519

service:
  enabled: false

pod:
  replicas: 1
  externalEgress: true
  fsGroup: 1000
  runAsUser: 10001
  runAsGroup: 10001

container:
  name: ""
  readOnlyRootFilesystem: false
  runAsUser: 10001
  runAsGroup: 10001
  runAsNonRoot: true
  homeDir: /home/app
