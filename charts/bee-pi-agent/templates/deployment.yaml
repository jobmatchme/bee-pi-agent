apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bee-pi-agent.name" . }}
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.pod.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "bee-pi-agent.name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "bee-pi-agent.name" . }}
        ai.jobmatch.me/external-egress: {{ ternary "true" "false" .Values.pod.externalEgress | quote }}
        {{- with .Values.agent.labels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- if .Values.image.pullSecretName }}
      imagePullSecrets:
        - name: {{ .Values.image.pullSecretName }}
      {{- end }}
      serviceAccountName: {{ include "bee-pi-agent.serviceAccountName" . }}
      securityContext:
        fsGroup: {{ .Values.pod.fsGroup }}
      initContainers:
        {{- if .Values.auth.secretName }}
        - name: auth-bootstrap
          image: {{ .Values.git.image }}
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              target_file={{ .Values.auth.mountPath | quote }}
              source_file=/worker-auth-source/{{ .Values.auth.secretKey }}
              target_dir="$(dirname "$target_file")"
              parent_dir="$(dirname "$target_dir")"
              if [ "$parent_dir" != "$target_dir" ]; then
                mkdir -p "$parent_dir"
                {{- if .Values.runtimeHome.enabled }}
                chown 0:0 "$parent_dir"
                chmod 700 "$parent_dir"
                {{- end }}
              fi
              {{- if .Values.runtimeHome.enabled }}
              if [ -d "$target_dir" ]; then
                chown 0:0 "$target_dir"
                chmod 700 "$target_dir"
              fi
              {{- end }}
              mkdir -p "$target_dir"
              {{- if .Values.runtimeHome.enabled }}
              if [ -f "$target_file" ]; then
                chown 0:0 "$target_file"
                chmod 600 "$target_file"
              fi
              {{- end }}
              tmp_file="$target_file.tmp"
              cp "$source_file" "$tmp_file"
              {{- if .Values.runtimeHome.enabled }}
              chmod 600 "$tmp_file"
              chown {{ .Values.pod.runAsUser }}:{{ .Values.pod.runAsGroup }} "$tmp_file"
              mv -f "$tmp_file" "$target_file"
              chown {{ .Values.pod.runAsUser }}:{{ .Values.pod.runAsGroup }} "$target_dir"
              chmod 700 "$target_dir"
              if [ "$parent_dir" != "$target_dir" ] && [ -d "$parent_dir" ]; then
                chown {{ .Values.pod.runAsUser }}:{{ .Values.pod.runAsGroup }} "$parent_dir"
                chmod 700 "$parent_dir"
              fi
              {{- else }}
              mv -f "$tmp_file" "$target_file"
              chgrp {{ .Values.pod.fsGroup }} "$target_file"
              chmod 640 "$target_file"
              {{- end }}
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
              add:
                - CHOWN
                - FOWNER
          volumeMounts:
            - name: workspace
              mountPath: {{ .Values.workspace.mountPath }}
            {{- if .Values.runtimeHome.enabled }}
            - name: runtime-home
              mountPath: {{ .Values.runtimeHome.mountPath }}
            {{- end }}
            - name: worker-auth
              mountPath: /worker-auth-source
              readOnly: true
        {{- end }}
        {{- if and .Values.workspace.enabled (or .Values.git.sshSecretName .Values.git.configSecretName) }}
        - name: git-runtime-bootstrap
          image: {{ .Values.git.image }}
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              ssh_dir={{ .Values.git.runtimeSshDir | quote }}
              mkdir -p "$ssh_dir"
              chmod 700 "$ssh_dir"
              {{- if .Values.git.sshSecretName }}
              cp /worker-git-ssh-source/ssh-privatekey "$ssh_dir/{{ .Values.git.runtimeKeyFile }}"
              chmod 600 "$ssh_dir/{{ .Values.git.runtimeKeyFile }}"
              chown {{ .Values.pod.runAsUser }}:{{ .Values.pod.runAsGroup }} "$ssh_dir/{{ .Values.git.runtimeKeyFile }}"
              if [ -f /worker-git-ssh-source/known_hosts ]; then
                cp /worker-git-ssh-source/known_hosts "$ssh_dir/known_hosts"
                chmod 644 "$ssh_dir/known_hosts"
                chown {{ .Values.pod.runAsUser }}:{{ .Values.pod.runAsGroup }} "$ssh_dir/known_hosts"
              fi
              {{- end }}
              {{- if .Values.git.configSecretName }}
              cp /worker-git-config-source/{{ .Values.git.configSecretKey }} {{ .Values.git.runtimeConfigPath | quote }}
              chmod 600 {{ .Values.git.runtimeConfigPath | quote }}
              chown {{ .Values.pod.runAsUser }}:{{ .Values.pod.runAsGroup }} {{ .Values.git.runtimeConfigPath | quote }}
              {{- end }}
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
              add:
                - CHOWN
                - FOWNER
          volumeMounts:
            - name: workspace
              mountPath: {{ .Values.workspace.mountPath }}
            {{- if .Values.runtimeHome.enabled }}
            - name: runtime-home
              mountPath: {{ .Values.runtimeHome.mountPath }}
            {{- end }}
            {{- if .Values.git.sshSecretName }}
            - name: git-ssh
              mountPath: /worker-git-ssh-source
              readOnly: true
            {{- end }}
            {{- if .Values.git.configSecretName }}
            - name: worker-git-config
              mountPath: /worker-git-config-source
              readOnly: true
            {{- end }}
        {{- end }}
        {{- if and .Values.workspace.enabled .Values.git.repoUrl }}
        - name: repo-bootstrap
          image: {{ .Values.git.image }}
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              target_dir="{{ include "bee-pi-agent.workDir" . }}"
              ensure_runtime_excludes() {
                exclude_file="$target_dir/.git/info/exclude"
                mkdir -p "$(dirname "$exclude_file")"
                touch "$exclude_file"
                grep -qxF ".bee-pi-agent/" "$exclude_file" || echo ".bee-pi-agent/" >>"$exclude_file"
              }
              ensure_origin_remote() {
                desired_url={{ .Values.git.repoUrl | quote }}
                if git -C "$target_dir" remote get-url origin >/dev/null 2>&1; then
                  current_url="$(git -C "$target_dir" remote get-url origin)"
                  if [ "$current_url" != "$desired_url" ]; then
                    git -C "$target_dir" remote set-url origin "$desired_url"
                  fi
                else
                  git -C "$target_dir" remote add origin "$desired_url"
                fi
              }
              fix_permissions() {
                find "$target_dir" \
                  \( -path "$target_dir/.bee-pi-agent" -o -path "$target_dir/.bee-pi-agent/*" \) -prune \
                  -o -exec chgrp {{ .Values.pod.fsGroup }} {} +
                find "$target_dir" \
                  \( -path "$target_dir/.bee-pi-agent" -o -path "$target_dir/.bee-pi-agent/*" \) -prune \
                  -o -exec chmod g=u {} +
                find "$target_dir" -type d \
                  \( -path "$target_dir/.bee-pi-agent" -o -path "$target_dir/.bee-pi-agent/*" \) -prune \
                  -o -exec chmod g+s {} +
              }
              if [ -d "$target_dir/.git" ]; then
                ensure_origin_remote
                ensure_runtime_excludes
                exit 0
              fi
              if [ -e "$target_dir" ] && [ -n "$(ls -A "$target_dir" 2>/dev/null)" ]; then
                echo "Target directory $target_dir exists and is not empty, refusing bootstrap"
                exit 1
              fi
              mkdir -p "$(dirname "$target_dir")"
              if [ -f /git-ssh/ssh-privatekey ]; then
                mkdir -p /tmp/git-ssh
                cp /git-ssh/ssh-privatekey /tmp/git-ssh/ssh-privatekey
                chmod 600 /tmp/git-ssh/ssh-privatekey
                if [ -f /git-ssh/known_hosts ]; then
                  cp /git-ssh/known_hosts /tmp/git-ssh/known_hosts
                  chmod 644 /tmp/git-ssh/known_hosts
                  export GIT_SSH_COMMAND="ssh -i /tmp/git-ssh/ssh-privatekey -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile=/tmp/git-ssh/known_hosts"
                else
                  export GIT_SSH_COMMAND="ssh -i /tmp/git-ssh/ssh-privatekey -o IdentitiesOnly=yes -o StrictHostKeyChecking=no"
                fi
              fi
              git clone --branch {{ .Values.git.branch | quote }} --depth {{ .Values.git.cloneDepth }} {{ .Values.git.repoUrl | quote }} "$target_dir"
              ensure_origin_remote
              ensure_runtime_excludes
              fix_permissions
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: workspace
              mountPath: {{ .Values.workspace.mountPath }}
            {{- if and .Values.git.repoUrl .Values.git.sshSecretName }}
            - name: git-ssh
              mountPath: /git-ssh
              readOnly: true
            {{- end }}
        {{- end }}
      containers:
        - name: {{ include "bee-pi-agent.containerName" . }}
          image: {{ printf "%s:%s" .Values.image.repository .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ include "bee-pi-agent.configName" . }}
            {{- if .Values.secretName }}
            - secretRef:
                name: {{ .Values.secretName }}
                optional: {{ .Values.secretOptional }}
            {{- end }}
          env:
            - name: BEE_PI_AGENT_SOCKET
              value: {{ .Values.transport.socketPath | quote }}
            {{- if .Values.auth.secretName }}
            - name: {{ .Values.auth.envName }}
              value: {{ .Values.auth.mountPath | quote }}
            {{- end }}
            {{- if .Values.runtimeHome.enabled }}
            - name: HOME
              value: {{ .Values.container.homeDir | quote }}
            {{- end }}
            {{- if .Values.git.configSecretName }}
            - name: GIT_CONFIG_GLOBAL
              value: {{ .Values.git.runtimeConfigPath | quote }}
            {{- end }}
            {{- if .Values.git.sshSecretName }}
            - name: GIT_SSH_COMMAND
              value: {{ printf "ssh -i %s/%s -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile=%s/known_hosts" .Values.git.runtimeSshDir .Values.git.runtimeKeyFile .Values.git.runtimeSshDir | quote }}
            {{- end }}
          securityContext:
            runAsUser: {{ .Values.container.runAsUser }}
            runAsGroup: {{ .Values.container.runAsGroup }}
            runAsNonRoot: {{ .Values.container.runAsNonRoot }}
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: {{ .Values.container.readOnlyRootFilesystem }}
            capabilities:
              drop:
                - ALL
          volumeMounts:
            {{- if .Values.runtimeHome.enabled }}
            - name: runtime-home
              mountPath: {{ .Values.runtimeHome.mountPath }}
            {{- end }}
            - name: worker-socket
              mountPath: {{ .Values.transport.socketDir }}
            - name: workspace
              mountPath: {{ .Values.workspace.mountPath }}
        - name: {{ .Values.sidecar.container.name }}
          image: {{ printf "%s:%s" .Values.sidecar.image.repository .Values.sidecar.image.tag }}
          imagePullPolicy: {{ .Values.sidecar.image.pullPolicy }}
          env:
            - name: BEE_WORKER_SIDECAR_CONFIG
              value: {{ printf "%s/%s" .Values.sidecar.configMountPath .Values.sidecar.configFileName | quote }}
          securityContext:
            runAsUser: {{ .Values.sidecar.container.runAsUser }}
            runAsGroup: {{ .Values.sidecar.container.runAsGroup }}
            runAsNonRoot: {{ .Values.sidecar.container.runAsNonRoot }}
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: {{ .Values.sidecar.container.readOnlyRootFilesystem }}
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: sidecar-config
              mountPath: {{ .Values.sidecar.configMountPath }}
              readOnly: true
            - name: worker-socket
              mountPath: {{ .Values.transport.socketDir }}
      volumes:
        - name: worker-socket
          emptyDir: {}
        - name: sidecar-config
          configMap:
            name: {{ include "bee-pi-agent.configName" . }}
            items:
              - key: {{ .Values.sidecar.configFileName }}
                path: {{ .Values.sidecar.configFileName }}
        {{- if .Values.runtimeHome.enabled }}
        - name: runtime-home
          emptyDir:
            {{- toYaml .Values.runtimeHome.emptyDir | nindent 12 }}
        {{- end }}
        - name: workspace
          {{- if eq .Values.workspace.type "emptyDir" }}
          emptyDir:
            {{- toYaml .Values.workspace.emptyDir | nindent 12 }}
          {{- else }}
          persistentVolumeClaim:
            claimName: {{ include "bee-pi-agent.claimName" . }}
          {{- end }}
        {{- if and .Values.workspace.enabled .Values.git.repoUrl .Values.git.sshSecretName }}
        - name: git-ssh
          secret:
            secretName: {{ .Values.git.sshSecretName }}
            defaultMode: 0400
        {{- end }}
        {{- if .Values.auth.secretName }}
        - name: worker-auth
          secret:
            secretName: {{ .Values.auth.secretName }}
        {{- end }}
        {{- if .Values.git.configSecretName }}
        - name: worker-git-config
          secret:
            secretName: {{ .Values.git.configSecretName }}
        {{- end }}
