apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "bee-pi-agent.configName" . }}
  namespace: {{ .Release.Namespace }}
data:
  BEE_PI_AGENT_WORKSPACE_ROOT: {{ .Values.runtime.workspaceRoot | quote }}
  BEE_PI_AGENT_WORKSPACE_CWD: {{ default (include "bee-pi-agent.workDir" .) .Values.runtime.workspaceCwd | quote }}
  BEE_PI_AGENT_STATE_DIR: {{ .Values.runtime.stateDir | quote }}
  BEE_PI_AGENT_BLOB_STORE_ROOT: {{ .Values.runtime.blobStoreRoot | quote }}
  {{- range $key, $value := .Values.config.env }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{ .Values.sidecar.configFileName }}: |
    {{- $workerSubject := required "sidecar.workerSubject is required" .Values.sidecar.workerSubject }}
    {{- dict
      "nats" (dict
        "servers" .Values.sidecar.nats.servers
        "name" .Values.sidecar.nats.name
      )
      "workerSubject" $workerSubject
      "worker" (dict
        "socketPath" .Values.transport.socketPath
        "requestTimeoutMs" .Values.sidecar.worker.requestTimeoutMs
        "connectRetryMs" .Values.sidecar.worker.connectRetryMs
        "maxConnectRetryMs" .Values.sidecar.worker.maxConnectRetryMs
      ) | toPrettyJson | nindent 4 }}
