agent:
  name: bee-pi-agent-chat

image:
  repository: ghcr.io/jobmatchme/bee-pi-agent
  tag: "0.1.0"
  pullSecretName: ghcr-registry-creds

sidecar:
  image:
    repository: ghcr.io/jobmatchme/bee-worker-sidecar
    tag: "0.1.0"
  workerSubject: bee.agent.pi.default

auth:
  secretName: bee-pi-agent-auth

git:
  repoUrl: "ssh://git@bare-git.git.svc.cluster.local:22/repos/cluster-content.git"
  branch: main
  targetDir: repo
  sshSecretName: bare-git-agent-ssh

workspace:
  enabled: true
  type: pvc
  size: 20Gi

config:
  env:
    BEE_PI_AGENT_MODEL_PROVIDER: openai
    BEE_PI_AGENT_MODEL_ID: gpt-5.4-mini

pod:
  replicas: 1
